# CI/CD Pipeline for brief-mcp
# Runs on every PR and push to main.
# OSS-03: lint, typecheck, tests across Node LTS × platform matrix
# OSS-06: reproducible builds via npm ci + lock file
# OSS-07: npm provenance for release builds

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Node ${{ matrix.node-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Lint (biome check)
        run: npm run lint

      - name: Type check (tsc --noEmit)
        run: npm run typecheck

      - name: Unit tests (vitest)
        run: npm test
        env:
          NODE_NO_WARNINGS: "1"

      - name: Build (production)
        run: npm run build

      - name: Dependency audit
        run: npm audit --audit-level=high
        # npm audit can be flaky on Windows — non-blocking there
        continue-on-error: ${{ matrix.os == 'windows-latest' }}

  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          NODE_NO_WARNINGS: "1"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  # Release builds with npm provenance (OSS-07)
  # Triggered only on push to main — not on PRs.
  # Actual publishing is manual (npm publish) or via a separate release workflow.
  # publishConfig.provenance is already set in package.json.
  release-build:
    name: Release build verification
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build for release
        run: npm run build

      - name: Verify package contents
        run: npm pack --dry-run

# ---
